name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd tests && npm ci

      - name: Validate schemas + examples + OpenAPI spec
        run: bash tests/validate-schemas.sh

      - name: Round-trip tests
        run: node tests/round-trip.js
