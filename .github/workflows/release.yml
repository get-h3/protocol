name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: cd tests && npm ci

      - name: Validate schemas + examples + OpenAPI spec
        run: bash tests/validate-schemas.sh

      - name: Round-trip tests
        run: node tests/round-trip.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true

  dispatch:
    needs: release
    runs-on: ubuntu-latest
    steps:
      # Repository admins must create DISPATCH_PAT with repo scope if it does not exist.
      - name: Dispatch protocol update to Go SDK
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_PAT }}
          repository: get-h3/sdk-go
          event-type: protocol-update

      - name: Dispatch protocol update to Python SDK
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_PAT }}
          repository: get-h3/sdk-python
          event-type: protocol-update

      - name: Dispatch protocol update to TypeScript SDK
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_PAT }}
          repository: get-h3/sdk-typescript
          event-type: schema-updated

      - name: Dispatch protocol update to shim
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_PAT }}
          repository: get-h3/shim
          event-type: protocol-updated
